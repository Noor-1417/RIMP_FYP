<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Your Certificate</title>
  </head>
  <body style="font-family: Arial, sans-serif; color: #222;">
    <div style="max-width:600px;margin:0 auto;padding:20px;">
      <h2 style="color:#0b63b3;">Congratulations, {{name}}!</h2>
      <p>Your certificate <strong>{{certificateNumber}}</strong> has been issued.</p>
      <p>Category: <strong>{{category}}</strong></p>
      <p>You can verify your certificate using the following link:</p>
      <p><a href="{{verificationUrl}}">{{verificationUrl}}</a></p>
      <p style="margin-top:24px;">Best regards,<br/>RIMP Team</p>
    </div>
  </body>
</html>
